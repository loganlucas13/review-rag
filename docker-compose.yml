services:
    db:
        image: pgvector/pgvector:pg15
        container_name: cs_480_postgres_db
        restart: always
        env_file:
            - .env
        ports:
            - '5432:5432'
        volumes:
            - pg_data:/var/lib/postgresql/data
        healthcheck:
            test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER}']
            interval: 10s
            timeout: 5s
            retries: 5

    backend:
        build:
            context: ./app/backend
            dockerfile: Dockerfile
        container_name: python_backend
        restart: on-failure
        depends_on:
            db:
                condition: service_healthy
        environment:
            - PYTHONUNBUFFERED=1
        env_file:
            - .env
        ports:
            - '4196:4196'
        volumes:
            - ./app/backend:/app

    frontend:
        build:
            context: ./app/frontend
            dockerfile: Dockerfile
        container_name: react_frontend
        restart: 'no'
        stdin_open: true
        tty: true
        depends_on:
            - backend
        env_file:
            - .env
        ports:
            - '5173:5173'
        volumes:
            - ./app/frontend:/app
            - /app/node_modules
        command: npm run dev -- --host

volumes:
    pg_data:
